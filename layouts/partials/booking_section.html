{{ $section := .section }}
{{ $bg_color := $section.bg_color | default "none" }}
<section id="{{ $section.section_id }}" class="section section--booking">
  <div class="container container--lg">
    <div {{ if ne $bg_color "none" }}class="section__bg"{{ end }}>
      <div class="section__content">
        {{ if $section.title }}
        <h2 class="section__title line-top">{{ $section.title }}</h2>
        {{ end }}
        {{ if $section.content }}
        <div class="section__body text-block">
          {{ partial "markdownify-block" $section.content }}
        </div>
        {{ end }}
        
        {{ if $section.cal_url }}
        <div class="booking-portal">
          <div id="cal-inline" style="width:100%;height:100%;overflow:scroll"></div>
          <script type="text/javascript">
            (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.q) { cal.q = []; } p(cal, ar); }; let js = d.createElement("script"), el = d.getElementsByTagName("script")[0]; js.async = 1; js.src = L; el.parentNode.insertBefore(js, el); }(window, Array, "https://app.cal.com/embed/embed.js"));
            Cal("init", {origin:"https://app.cal.com"});
            Cal("inline", {
              elementOrSelector: "#cal-inline",
              calLink: "{{ $section.cal_url }}",
              layout: "month_view"
            });
            Cal("ui", {"styles":{"branding":{"brandColor":"#542bff"}},"hideEventTypeDetails":false,"layout":"month_view"});
          </script>
        </div>
        {{ end }}
      </div>
    </div>
  </div>
</section>
